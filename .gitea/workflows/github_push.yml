name: push-latest-to-ghcr

on:
  workflow_dispatch:

concurrency:
  group: push-ghcr-latest
  cancel-in-progress: true

env:
  SRC_REGISTRY: git.server.lan
  SRC_IMAGE: ${{ env.SRC_REGISTRY }}/${{ gitea.repository }}
  GHCR_IMAGE: ghcr.io/psevdocoder/metric-sherlock-diploma-ui

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Login to source registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SRC_REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull and push latest
        run: |
          docker pull $SRC_IMAGE:latest
          docker tag $SRC_IMAGE:latest $GHCR_IMAGE:latest
          docker push $GHCR_IMAGE:latest
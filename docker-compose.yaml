services:
  metric-sherlock-ui:
    image: git.server.lan/maksim/metric-sherlock-diploma-ui:latest
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_API_REQUEST_CASE: ${VITE_API_REQUEST_CASE:-snake}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-staging}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-metric-sherlock-ui}
    ports:
      - "${UI_PORT:-4500}:80"
    restart: unless-stopped
